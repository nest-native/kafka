name: Sample request
description: Request a focused runnable sample.
title: "sample: "
labels:
  - sample
body:
  - type: textarea
    id: scenario
    attributes:
      label: Scenario
      description: What real application scenario should the sample demonstrate?
    validations:
      required: true
  - type: dropdown
    id: sample-area
    attributes:
      label: Area
      options:
        - basic consumer + producer
        - guards and authorization on handlers
        - exception filters and error mapping
        - validation pipes (class-validator)
        - Zod validation
        - headers and context decorators
        - batch consume + per-topic concurrency
        - transactional producer
        - graceful shutdown
        - migration from @nestjs/microservices Kafka
        - other
    validations:
      required: true
  - type: textarea
    id: expected-files
    attributes:
      label: Expected shape
      description: Mention the important modules, controllers, consumers, guards, filters, or smoke tests the sample should include.
  - type: checkboxes
    id: rules
    attributes:
      label: Sample rules
      options:
        - label: The sample should be runnable from a clean checkout.
          required: true
        - label: Package changes should be split into a separate PR if the sample exposes a library bug.
          required: true
